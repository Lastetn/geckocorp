<div class="login-box">
    <h1>Connexion / Inscription</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button id="registerBtn">Créer un compte</button>
    <button id="loginBtn">Se connecter</button>
	<button id="github-login">Se connecter avec GitHub</button>
	<button id="discord-login">Se connecter avec Discord</button>

    <p id="status"></p>
</div>

<script type="module">
    import { supabase } from "./supabase.js";

	export const supabaseUrl = "https://ljhizncikukcddsbkdxv.supabase.co";
	export const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqaGl6bmNpa3VrY2Rkc2JrZHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2OTU4MzMsImV4cCI6MjA5OTI3MTgzM30.zHWJk4AM9ODijSJWMebk0YD565IX82ShmVKwsqoGidg";

	console.log("SUPA =", supabase);

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const status = document.getElementById("status");

// Inscription
document.getElementById("registerBtn").onclick = async () => {
    const { data, error } = await supabase.auth.signUp({
        email: email.value,
        password: password.value
    });

    if (error) {
        status.textContent = error.message;
        return;
    }

	if (error?.message === "User already registered") {
    	status.textContent = "Ce compte existe déjà, connecte-toi.";
	}

    status.textContent = "Compte créé ! Vérifie ton email.";

    // ➜ Créer la ligne dans profiles
    const user = data.user;
    if (user) {
        await supabase.from("profiles").insert({
            id: user.id,
            username: "Anon",
            avatar_url: "default.png"
        });
    }
};


    // Connexion
    document.getElementById("loginBtn").onclick = async () => {
        const { error } = await supabase.auth.signInWithPassword({
            email: email.value,
            password: password.value
        });
        status.textContent = error ? error.message : "Connecté !";
        if (!error) window.location.href = "index.html";
    };

	document.getElementById("github-login").addEventListener("click", async () => {
    	const { data, error } = await supabase.auth.signInWithOAuth({
        	provider: "github",
        	options: {
            	redirectTo: "https://lastetn.github.io/geckocorp/"
        	}
    	});

    	if (error) {
        	console.error("Erreur GitHub OAuth :", error);
    	}
	});

	document.getElementById("discord-login").addEventListener("click", async () => {
    	const { data, error } = await supabase.auth.signInWithOAuth({
        	provider: "discord",
        	options: {
        	    redirectTo: "https://lastetn.github.io/geckocorp/"
        	}
    	});

    	if (error) {
    	    console.error("Erreur Discord OAuth :", error);
    	}
	});

</script>

<script type="module" src="script.js"></script>
<script type="module" src="global-auth.js"></script>
