
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="style.css">
	<link rel="icon" href="logo-Gecko.png" sizes="32x32">
</head>

<body>

<nav>
    <a href="index.html">Accueil</a>
    <a href="about.html">À propos</a>
    <a href="contact.html">Contact</a>
	<a href="messages.html">Messagerie</a>
	<a href="settings.html">Paramètres</a>
	<a href="login.html" id="login-link">Connexion</a>
	<a href="#" id="logout-link" style="display:none;">Déconnexion</a>

    <button id="theme-toggle">🌙</button>
</nav>

<div class="login-box">
    <h1>Connexion / Inscription</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button id="registerBtn">Créer un compte</button>
    <button id="loginBtn">Se connecter</button>

    <p id="status"></p>
</div>

<script type="module">
    import { supabase } from "./supabase.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const status = document.getElementById("status");

// Inscription
document.getElementById("registerBtn").onclick = async () => {
    const { data, error } = await supabase.auth.signUp({
        email: email.value,
        password: password.value
    });

    if (error) {
        status.textContent = error.message;
        return;
    }

    status.textContent = "Compte créé ! Vérifie ton email.";

    // ➜ Créer la ligne dans profiles
    const user = data.user;
    if (user) {
        await supabase.from("profiles").insert({
            id: user.id,
            username: "Anon",
            avatar_url: "default.png"
        });
    }
};


    // Connexion
    document.getElementById("loginBtn").onclick = async () => {
        const { error } = await supabase.auth.signInWithPassword({
            email: email.value,
            password: password.value
        });
        status.textContent = error ? error.message : "Connecté !";
        if (!error) window.location.href = "index.html";
    };

</script>

<script type="module" src="script.js"></script>
<script type="module" src="global-auth.js"></script>
</body>
</html>
